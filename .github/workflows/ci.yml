name: CI
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  eligibility-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/eligibility-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: PYTHONPATH=src python -m pytest -q
